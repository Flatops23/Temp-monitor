<body>
    <div class="card">
        <span id="mode-label" class="mode-badge">Initializing...</span>
        <div id="temp-val" class="temp-display">--°C</div>
        <div id="status-msg" class="status-text">Waiting for connection...</div>
        <button id="connectBtn" style="display:none;">CONNECT ARDUINO</button>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY", // <--- MAKE SURE TO PUT YOUR REAL KEY HERE
            authDomain: "climateguard-e75fb.firebaseapp.com",
            databaseURL: "https://climateguard-e75fb-default-rtdb.firebaseio.com/",
            projectId: "climateguard-e75fb",
            storageBucket: "climateguard-e75fb.appspot.com",
            messagingSenderId: "YOUR_SENDER_ID",
            appId: "YOUR_APP_ID"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const tempDisp = document.getElementById('temp-val');
        const statusMsg = document.getElementById('status-msg');
        const connectBtn = document.getElementById('connectBtn');
        const modeLabel = document.getElementById('mode-label');

        if ("serial" in navigator) {
            modeLabel.innerText = "Admin Gateway";
            connectBtn.style.display = "block";
        } else {
            modeLabel.innerText = "Remote Monitor";
            statusMsg.innerText = "Syncing with Cloud...";
            listenToCloud();
        }

        connectBtn.addEventListener('click', async () => {
            try {
                const port = await navigator.serial.requestPort();
                await port.open({ baudRate: 9600 });
                connectBtn.style.display = "none";
                statusMsg.innerText = "Hardware Linked";
                const decoder = new TextDecoderStream();
                port.readable.pipeTo(decoder.writable);
                const reader = decoder.readable.getReader();

                while (true) {
                    const { value } = await reader.read();
                    if (value) {
                        const match = value.match(/TEMP: (\d+\.\d+)/);
                        if (match) {
                            const temperature = parseFloat(match[1]);
                            updateDisplay(temperature);
                            db.ref('live_data/current_temp').set(temperature);
                        }
                    }
                }
            } catch (err) {
                console.error("Serial error:", err);
                statusMsg.innerText = "Connection Failed";
            }
        });

        function listenToCloud() {
            db.ref('live_data/current_temp').on('value', (snapshot) => {
                const cloudTemp = snapshot.val();
                if (cloudTemp !== null) updateDisplay(cloudTemp);
            });
        }

        function updateDisplay(t) {
            tempDisp.innerText = t.toFixed(1) + "°C";
            if (t >= 32) {
                tempDisp.classList.add('is-danger');
                statusMsg.innerText = "CRITICAL HEAT DETECTED";
                statusMsg.style.color = "#ef4444";
            } else {
                tempDisp.classList.remove('is-danger');
                statusMsg.innerText = "System Stable";
                statusMsg.style.color = "#94a3b8";
            }
        }

        // --- SERVICE WORKER REGISTRATION ---
        if ("serviceWorker" in navigator) {
            navigator.serviceWorker.register("/service-worker.js") // Matches your filename
            .then(() => console.log("SW Registered!"))
            .catch((err) => console.log("SW Error:", err));
        }
    </script> 
</body>
</html>
