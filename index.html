<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ClimateGuard IoT Dashboard</title>
    <link rel="manifest" href="manifest.json">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <style>
        :root { --bg: #0f172a; --card: #1e293b; --accent: #38bdf8; --danger: #ef4444; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        .card { background: var(--card); padding: 2.5rem; border-radius: 2rem; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); width: 90%; max-width: 380px; text-align: center; border: 1px solid #334155; }
        .mode-badge { font-size: 0.7rem; background: #334155; padding: 5px 12px; border-radius: 20px; color: var(--accent); letter-spacing: 1px; text-transform: uppercase; }
        .temp-display { font-size: 5rem; font-weight: 800; margin: 1.5rem 0; color: var(--accent); transition: all 0.3s ease; }
        .status-text { font-size: 1rem; font-weight: 600; margin-bottom: 2rem; color: #94a3b8; }
        button { background: var(--accent); color: #0f172a; border: none; padding: 1rem 2rem; border-radius: 1rem; font-weight: bold; cursor: pointer; width: 100%; font-size: 1rem; transition: transform 0.2s; }
        button:active { transform: scale(0.98); }
        .is-danger { color: var(--danger) !important; text-shadow: 0 0 20px rgba(239, 68, 68, 0.4); }
    </style>
</head>
<body>

    <div class="card">
        <span id="mode-label" class="mode-badge">Initializing...</span>
        <div id="temp-val" class="temp-display">--°C</div>
        <div id="status-msg" class="status-text">Waiting for connection...</div>
        <button id="connectBtn" style="display:none;">CONNECT ARDUINO</button>
    </div>

    <script>
        // --- CONFIGURATION ---
        // Replace these with your Firebase Project Settings keys!
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY", 
            authDomain: "climateguard-e75fb.firebaseapp.com",
            databaseURL: "https://climateguard-e75fb-default-rtdb.firebaseio.com/",
            projectId: "climateguard-e75fb",
            storageBucket: "climateguard-e75fb.appspot.com",
            messagingSenderId: "YOUR_SENDER_ID",
            appId: "YOUR_APP_ID"
        };

        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const tempDisp = document.getElementById('temp-val');
        const statusMsg = document.getElementById('status-msg');
        const connectBtn = document.getElementById('connectBtn');
        const modeLabel = document.getElementById('mode-label');

        // --- DEVICE DETECTION ---
        if ("serial" in navigator) {
            // LAPTOP MODE (Admin)
            modeLabel.innerText = "Admin Gateway";
            connectBtn.style.display = "block";
        } else {
            // PHONE MODE (Viewer)
            modeLabel.innerText = "Remote Monitor";
            statusMsg.innerText = "Syncing with Cloud...";
            listenToCloud();
        }

        // --- ADMIN LOGIC (Laptop) ---
        connectBtn.addEventListener('click', async () => {
            try {
                const port = await navigator.serial.requestPort();
                await port.open({ baudRate: 9600 });
                
                connectBtn.style.display = "none";
                statusMsg.innerText = "Hardware Linked";

                const decoder = new TextDecoderStream();
                port.readable.pipeTo(decoder.writable);
                const reader = decoder.readable.getReader();

                while (true) {
                    const { value } = await reader.read();
                    if (value) {
                        // Looks for "TEMP: 25.5" format from Arduino
                        const match = value.match(/TEMP: (\d+\.\d+)/);
                        if (match) {
                            const temperature = parseFloat(match[1]);
                            updateDisplay(temperature);
                            // Send to Firebase
                            db.ref('live_data/current_temp').set(temperature);
                        }
                    }
                }
            } catch (err) {
                console.error("Serial error:", err);
                statusMsg.innerText = "Connection Failed";
            }
        });

        // --- VIEWER LOGIC (Phone) ---
        function listenToCloud() {
            db.ref('live_data/current_temp').on('value', (snapshot) => {
                const cloudTemp = snapshot.val();
                if (cloudTemp !== null) {
                    updateDisplay(cloudTemp);
                }
            });
        }

        // --- UI UPDATES ---
        function updateDisplay(t) {
            tempDisp.innerText = t.toFixed(1) + "°C";
            
            if (t >= 32) { // Danger threshold
                tempDisp.classList.add('is-danger');
                statusMsg.innerText = "CRITICAL HEAT DETECTED";
                statusMsg.style.color = "#ef4444";
            } else {
                tempDisp.classList.remove('is-danger');
                statusMsg.innerText = "System Stable";
                statusMsg.style.color = "#94a3b8";
            }
        }

        // Register Service Worker for PWA
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }
    </script>
</body>
</html>
