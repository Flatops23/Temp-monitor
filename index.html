<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ClimateGuard IoT Dashboard</title>
    <link rel="manifest" href="manifest.json">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <style>
        :root { --bg: #0f172a; --card: #1e293b; --accent: #38bdf8; --danger: #ef4444; --warning: #facc15; --success: #4ade80; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        
        .card { 
            background: var(--card); 
            padding: 2.5rem; 
            border-radius: 2rem; 
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); 
            width: 90%; 
            max-width: 380px; 
            text-align: center; 
            border: 2px solid #334155; 
            transition: border-color 0.3s ease;
        }
        
        .mode-badge { font-size: 0.7rem; background: #334155; padding: 5px 12px; border-radius: 20px; color: var(--accent); letter-spacing: 1px; text-transform: uppercase; }
        .temp-display { font-size: 5rem; font-weight: 800; margin: 1rem 0; color: var(--accent); transition: all 0.3s ease; }
        
        /* Data Grid for Humidity and LED */
        .data-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1.5rem; }
        .data-box { background: rgba(255,255,255,0.05); padding: 1rem; border-radius: 1.2rem; border: 1px solid #334155; }
        .label { font-size: 0.7rem; color: #94a3b8; text-transform: uppercase; margin-bottom: 4px; font-weight: 600; }
        .value { font-size: 1.4rem; font-weight: 700; color: var(--accent); }

        .status-text { font-size: 0.9rem; font-weight: 600; margin-bottom: 1.5rem; color: #94a3b8; }
        button { background: var(--accent); color: #0f172a; border: none; padding: 1rem 2rem; border-radius: 1rem; font-weight: bold; cursor: pointer; width: 100%; font-size: 1rem; }
        
        /* Status Colors */
        .is-warning { color: var(--warning) !important; text-shadow: 0 0 20px rgba(250, 204, 21, 0.3); }
        .is-danger { color: var(--danger) !important; text-shadow: 0 0 20px rgba(239, 68, 68, 0.4); }
    </style>
</head>
<body>

    <div class="card" id="main-card">
        <span id="mode-label" class="mode-badge">Initializing...</span>
        <div id="temp-val" class="temp-display">--°C</div>
        
        <div class="data-grid">
            <div class="data-box">
                <div class="label">Humidity</div>
                <div id="humid-val" class="value">--%</div>
            </div>
            <div class="data-box">
                <div class="label">LED Status</div>
                <div id="led-status" class="value" style="font-size: 1.1rem;">OFF</div>
            </div>
        </div>

        <div id="status-msg" class="status-text">Detecting Device...</div>
        <button id="connectBtn" style="display:none;">CONNECT ARDUINO</button>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDY-n74nX4t6McfhQYWpXiglnHaNF5he-A",
            authDomain: "climateguard-e75fb.firebaseapp.com",
            databaseURL: "https://climateguard-e75fb-default-rtdb.firebaseio.com",
            projectId: "climateguard-e75fb",
            storageBucket: "climateguard-e75fb.firebasestorage.app",
            messagingSenderId: "242030755632",
            appId: "1:242030755632:web:ac4eda664fe7b4585a52f5"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const tempDisp = document.getElementById('temp-val');
        const humidDisp = document.getElementById('humid-val');
        const ledStatus = document.getElementById('led-status');
        const statusMsg = document.getElementById('status-msg');
        const connectBtn = document.getElementById('connectBtn');
        const modeLabel = document.getElementById('mode-label');
        const mainCard = document.getElementById('main-card');

        const isMobile = /Android|iPhone|iPad|iPod/i.test(navigator.userAgent);
        const supportsSerial = ("serial" in navigator);

        if (supportsSerial && !isMobile) {
            modeLabel.innerText = "Admin Gateway";
            connectBtn.style.display = "block";
            statusMsg.innerText = "Ready to Link Hardware";
        } else {
            modeLabel.innerText = "Remote Monitor";
            connectBtn.style.display = "none";
            statusMsg.innerText = "Connecting to Cloud...";
            startCloudListener();
        }

        function updateUI(t, h) {
            tempDisp.innerText = t.toFixed(1) + "°C";
            humidDisp.innerText = h.toFixed(0) + "%";

            if (t < 31) {
                tempDisp.className = "temp-display";
                ledStatus.innerText = "🟢 GREEN";
                ledStatus.style.color = "#4ade80";
                mainCard.style.borderColor = "#334155";
                statusMsg.innerText = "System Stable";
            } else if (t >= 31 && t < 32) {
                tempDisp.className = "temp-display is-warning";
                ledStatus.innerText = "🟡 YELLOW";
                ledStatus.style.color = "#facc15";
                mainCard.style.borderColor = "#facc15";
                statusMsg.innerText = "Warning: High Heat";
            } else {
                tempDisp.className = "temp-display is-danger";
                ledStatus.innerText = "🔴 RED";
                ledStatus.style.color = "#ef4444";
                mainCard.style.borderColor = "#ef4444";
                statusMsg.innerText = "CRITICAL HEAT ALERT";
            }
        }

        // --- LAPTOP: Read from Arduino ---
        connectBtn.addEventListener('click', async () => {
            try {
                const port = await navigator.serial.requestPort();
                await port.open({ baudRate: 9600 });
                connectBtn.style.display = "none";
                statusMsg.innerText = "Hardware Linked";

                const decoder = new TextDecoderStream();
                port.readable.pipeTo(decoder.writable);
                const reader = decoder.readable.getReader();

                while (true) {
                    const { value } = await reader.read();
                    if (value) {
                        // Matches your Arduino format: TEMP: 30.00C  |  HUMIDITY: 50.00%
                        const tMatch = value.match(/TEMP:\s*([\d.]+)/);
                        const hMatch = value.match(/HUMIDITY:\s*([\d.]+)/);
                        
                        if (tMatch && hMatch) {
                            const t = parseFloat(tMatch[1]);
                            const h = parseFloat(hMatch[1]);
                            updateUI(t, h);
                            db.ref('live_data').set({ current_temp: t, current_humid: h });
                        }
                    }
                }
            } catch (err) {
                statusMsg.innerText = "Connection Failed";
            }
        });

        // --- PHONE: Read from Firebase ---
        function startCloudListener() {
            db.ref('live_data').on('value', (snapshot) => {
                const data = snapshot.val();
                if (data) {
                    updateUI(data.current_temp, data.current_humid);
                    statusMsg.innerText = "Live Sync Active";
                }
            });
        }

        if ("serviceWorker" in navigator) {
            navigator.serviceWorker.register("/service-worker.js");
        }
    </script>
</body>
</html>
