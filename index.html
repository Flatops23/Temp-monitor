<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ClimateGuard IoT</title>
    <link rel="manifest" href="manifest.json">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        body { background: #121212; color: white; font-family: sans-serif; text-align: center; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        .card { background: #1e1e1e; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); width: 320px; }
        .temp { font-size: 4rem; font-weight: bold; color: #03dac6; margin: 20px 0; }
        #status { font-size: 0.9rem; color: #888; text-transform: uppercase; letter-spacing: 1px; }
        button { background: #03dac6; color: #121212; border: none; padding: 15px 25px; border-radius: 50px; font-weight: bold; cursor: pointer; width: 100%; margin-top: 20px; }
        .danger { color: #cf6679; }
    </style>
</head>
<body>

    <div class="card">
        <div id="mode-label" style="font-size: 0.7rem; color: #555;">DETECTING DEVICE...</div>
        <div id="temp" class="temp">--°C</div>
        <div id="status">System Offline</div>
        <button id="connectBtn" style="display:none;">CONNECT ARDUINO</button>
    </div>

    <script>
        // PASTE YOUR FIREBASE KEYS HERE
        const firebaseConfig = {
            apiKey: "YOUR_KEY",
            authDomain: "YOUR_ID.firebaseapp.com",
            databaseURL: "https://YOUR_ID-default-rtdb.firebaseio.com",
            projectId: "YOUR_ID",
            storageBucket: "YOUR_ID.appspot.com",
            messagingSenderId: "YOUR_SENDER_ID",
            appId: "YOUR_APP_ID"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const tempDiv = document.getElementById('temp');
        const statusDiv = document.getElementById('status');
        const btn = document.getElementById('connectBtn');
        const modeLabel = document.getElementById('mode-label');

        // Check if Laptop (Admin) or Phone (Viewer)
        if ("serial" in navigator) {
            modeLabel.innerText = "LAPTOP ADMIN MODE";
            btn.style.display = "block";
        } else {
            modeLabel.innerText = "PHONE REMOTE VIEWER";
            statusDiv.innerText = "WAITING FOR CLOUD DATA...";
            // Listen to Firebase
            db.ref('climate/temp').on('value', (snap) => {
                const val = snap.val();
                if (val) updateUI(val);
            });
        }

        btn.onclick = async () => {
            const port = await navigator.serial.requestPort();
            await port.open({ baudRate: 9600 });
            btn.style.display = "none";
            statusDiv.innerText = "CONNECTED TO USB";

            const decoder = new TextDecoderStream();
            port.readable.pipeTo(decoder.writable);
            const reader = decoder.readable.getReader();

            while (true) {
                const { value } = await reader.read();
                if (value) {
                    const match = value.match(/TEMP: (\d+\.\d+)/);
                    if (match) {
                        const t = parseFloat(match[1]);
                        updateUI(t);
                        db.ref('climate/temp').set(t); // Sync to Cloud
                    }
                }
            }
        };

        function updateUI(t) {
            tempDiv.innerText = t.toFixed(1) + "°C";
            if (t > 32) {
                tempDiv.classList.add('danger');
                statusDiv.innerText = "HOT - ALARM ACTIVE";
            } else {
                tempDiv.classList.remove('danger');
                statusDiv.innerText = "NORMAL TEMPERATURE";
            }
        }

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }
    </script>
</body>
</html>
